kind = "web"
previewPath = "/"
title = "الموحد - أداة بحث"
version = "1.0.0"
id = "artifacts/almowahid"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22517
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/almowahid run dev"

[services.env]
PORT = "22517"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/almowahid", "run", "build"]
publicDir = "artifacts/almowahid/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
